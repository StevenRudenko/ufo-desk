esphome:
  name: ufodesk

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  hardware_uart: UART1

captive_portal:

api:
  encryption:
    key: "...and very secret.."

ota:
  - platform: esphome
    password: "...and very secret.."

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ufodesktest Fallback Hotspot"
    password: "N4jvjHApeeqm"

external_components:
  - source: github://StevenRudenko/ufo-desk
    components: [ ufo_desk ]
    refresh: 0s

uart:
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 57600

ufo_desk:
  id: the_desk
  on_desk_event:
    - lambda: |-
        const std::array all_switches = {
          id(switch_up),
          id(switch_down),
        };
        if (x.type == ufo_desk::UfoDeskEventType::curHeightChanged) {
          id(sensor_desk_height).publish_state(x.desk.cur_height_mm());
        } else if (x.type == ufo_desk::UfoDeskEventType::errorChanged) {
          id(tsensor_error).publish_state(str_sprintf("E%02d", x.desk.error_code()));
        } else if (x.type == ufo_desk::UfoDeskEventType::positionStatusChanged) {
          id(tsensor_status).publish_state(x.desk.position_status_str());
          if (x.desk.position_status() != ufo_desk::PositionStatus::movingSlow &&
              x.desk.position_status() != ufo_desk::PositionStatus::movingFast) {
            id(switch_up).turn_off();
            id(switch_down).turn_off();
          }
        } else if (x.type == ufo_desk::UfoDeskEventType::btnStateChanged) {
          auto b = x.desk.pushed_button();
          if (b == ufo_desk::Button::up) {
            ufo_desk::exclusive_turn_on(id(switch_up), all_switches);
          } else if (b == ufo_desk::Button::down) {
            ufo_desk::exclusive_turn_on(id(switch_down), all_switches);
          } else if (b == ufo_desk::Button::none) {
            ufo_desk::exclusive_turn_on((template_::TemplateSwitch*)nullptr, all_switches);
          }
        }

sensor:
  - platform: template
    id: sensor_desk_height
    name: Desk height
    accuracy_decimals: 0
    unit_of_measurement: mm
    icon: mdi:ruler

text_sensor:
  - platform: template
    id: tsensor_error
    name: Error
    icon: mdi:bug
  - platform: template
    id: tsensor_status
    name: Status

switch:
  - platform: template
    id: switch_up
    name: "Up"
    icon: mdi:arrow-up-bold
    optimistic: true
    turn_on_action:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::up);
    turn_off_action:
      lambda: |-
        id(the_desk).desk().release_button();
  - platform: template
    id: switch_down
    name: "Down"
    icon: mdi:arrow-down-bold
    optimistic: true
    turn_on_action:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::down);
    turn_off_action:
      lambda: |-
        id(the_desk).desk().release_button();

binary_sensor:
  - platform: gpio
    name: GPIO button up
    internal: true
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
    filters:
      - invert:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::up);
    on_release:
      lambda: |-
        id(the_desk).desk().release_button();
    on_double_click:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::preset1);
  - platform: gpio
    name: GPIO button down
    internal: true
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
    filters:
      - invert:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::down);
    on_release:
      lambda: |-
        id(the_desk).desk().release_button();
    on_double_click:
      lambda: |-
        id(the_desk).desk().push_button(ufo_desk::Button::preset2);
